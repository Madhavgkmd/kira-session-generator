<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KIRA X MD Session Generator</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

</head>
<body>

<div id="particles-js"></div>

<div class="stars"></div>

<div class="cursor"></div>

<div class="container">

    <div class="logo">⚡</div>

    <h1 class="title">KIRA X MD</h1>

    <p class="subtitle">
        Premium WhatsApp Session Generator
    </p>

    <input
    type="text"
    id="number"
    placeholder="Enter WhatsApp Number (e.g. 919188252308)"
>
    <div class="btn-group">

        <button id="pairBtn">
            🔑 Generate Pair Code
        </button>

        <button id="qrBtn">
            📱 Generate QR Code
        </button>

    </div>

    <div id="result">
        Session details will appear here...
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
